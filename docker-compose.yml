services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vrp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vrp_password}
      POSTGRES_DB: ${POSTGRES_DB:-vrp}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Applied alphabetically on first init only:
      - ./db/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
      - ./db/migrations/002_analysis.sql:/docker-entrypoint-initdb.d/002_analysis.sql:ro
      - ./db/migrations/003_inventory.sql:/docker-entrypoint-initdb.d/003_inventory.sql:ro
      - ./db/migrations/004_multidepot.sql:/docker-entrypoint-initdb.d/004_multidepot.sql:ro
      - ./db/seed.sql:/docker-entrypoint-initdb.d/005_seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vrp} -d ${POSTGRES_DB:-vrp}"]
      interval: 5s
      timeout: 5s
      retries: 10

  optimization-service:
    build: ./optimization-service
    environment:
      SOLVER_TIME_LIMIT: ${SOLVER_TIME_LIMIT:-10}
    ports:
      - "${OPTIMIZATION_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      BACKEND_PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-vrp}:${POSTGRES_PASSWORD:-vrp_password}@postgres:5432/${POSTGRES_DB:-vrp}
      OPTIMIZATION_SERVICE_URL: http://optimization-service:8000
      ORS_API_KEY: ${ORS_API_KEY:-}
      ORS_PROFILE: ${ORS_PROFILE:-driving-car}
      ORS_GEOCODE_COUNTRY: ${ORS_GEOCODE_COUNTRY:-}
      ORS_GEOCODE_RADIUS_KM: ${ORS_GEOCODE_RADIUS_KM:-60}
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    depends_on:
      postgres:
        condition: service_healthy
      optimization-service:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000/api}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend

volumes:
  pgdata:
